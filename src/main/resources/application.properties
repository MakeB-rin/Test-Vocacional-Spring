spring.application.name=Orientacion-Vocacional-IDRRU-Back

# ===============================
# CONFIGURACION DEL SERVIDOR
# ===============================
server.port=8080

# ===============================
# CONFIGURACION DE LA BASE DE DATOS
# MODIFICAR DE ACUERDO A SU CONFIGURACION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/orientacion_db?createDatabaseIfNotExist=true
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACION DE HIBERNATE (JPA)
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
